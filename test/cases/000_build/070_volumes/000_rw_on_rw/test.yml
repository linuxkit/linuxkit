kernel:
  image: linuxkit/kernel:6.6.13
  cmdline: "console=ttyS0 console=ttyAMA0"
init:
  - linuxkit/init:493f0a88594f032e6af4804469934f8658ceefe6
  - linuxkit/runc:8b5af3365fc7d015db4e44113d93c7b1f8e2d2ab
onboot:
  - name: test1
    image: alpine:3.20
    binds:
      - /write.sh:/write.sh
      - vola:/vola
    command: ["sh", "-c", "/write.sh"]
  - name: test2
    image: alpine:3.20
    binds:
      - /check.sh:/check.sh
      - vola:/vola
    command: ["sh", "-c", "/check.sh"]
  - name: poweroff
    image: linuxkit/poweroff:30e2aaed00660c7938c291b55756a0ee69fd9a0f
    command: ["/bin/sh", "/poweroff.sh", "10"]
volumes:
  - name: vola
files:
  - path: check.sh
    source: ./check.sh
    mode: "0700"
  - path: write.sh
    source: ./write.sh
    mode: "0700"
